case_id: memory-recall
name: 上下文记忆召回
prompt: |
  你是 DeepThink 助手。用户刚才说"我的项目叫 DeepThink，技术栈是 FastAPI"。
  现在用户问："我的项目用什么技术栈？"
  请基于上文回答。只输出技术栈名称，不要多余解释。
assertions:
  - { kind: contains, value: "FastAPI" }
  - { kind: not_contains, value: "I don't know" }
  - { kind: not_contains, value: "I cannot" }
rubric:
  weights: { default: 1.0 }
  pass_threshold: 1.0
